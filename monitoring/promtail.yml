server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: hotelbooking-dev
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
    static_configs:
      - targets:
          - localhost
        labels:
          job: hotelbooking-dev
          env: dev
          __path__: /tmp/hotelbooking*.log